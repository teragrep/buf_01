link TrackedLease to Lease--><path d="M68,179.28 C68,211.5 68,247.31 68,271.5 " fill="none" id="TrackedLease-&gt;Lease" style="stroke: #A80036; stroke-width: 1.0;"/><polygon fill="#A80036" points="68,276.78,72,267.78,68,271.78,64,267.78,68,276.78" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="321" x="69" y="243.0669">provides read/write functionality and position state</text><!--MD5=[e3f891d857e85c671d9e4c8ab9e108a5]
@startuml inline_umlgraph_6.svg
interface Lease
interface TrackedLease {
+ hasNext();
+ next();
+ write(b);
+ currentPosition();
+ position(p);
+ currentLimit();
+ limit(l);
+ flip();
}

TrackedLease - -> Lease : provides read/write functionality and position state

note right of TrackedLease
Responsibilities:
- Retain state for position
- Retain state for limit
- Advance or modify position
- Advance of modify limit
- Provide next byte
- Write next byte
- Check if more bytes are available in current position
- Flip the "buffer" aka set limit=pos and pos=0

Collaborators:
- Lease
end note
@enduml

